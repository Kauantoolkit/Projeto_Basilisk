spring:
  application:
    name: gym-manager

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gym_manager}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8081}
  error:
    include-message: never
    include-binding-errors: never

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

# ── Basilisk Security ───────────────────────────────────────────────────────
basilisk:
  security:
    jwt:
      secret: ${JWT_SECRET:changeme-minimum-32-characters-long!!}
      expiration-ms: 86400000   # 24h

# ── Gym Finance Alerts ──────────────────────────────────────────────────────
gym:
  finance:
    alert:
      upcoming-days: 3
