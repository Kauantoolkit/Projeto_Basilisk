<svg width="100%" viewBox="0 0 680 350">
  <g transform="translate(340, 150)">
    <!-- Hexagonal spiral snake - body gets thinner toward tail -->
    <path d="M-8,-80 L55,-45 L55,30 L0,65 L-58,32 L-58,-28 L-20,-52" 
          fill="none" stroke="#1B2A4A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner coil -->
    <path d="M-20,-52 L22,-32 L22,12 L-5,28" 
          fill="none" stroke="#2E8B57" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Snake head at the start -->
    <circle cx="-8" cy="-80" r="10" fill="#1B2A4A"/>
    <circle cx="-4" cy="-84" r="3" fill="#2E8B57"/>
    <circle cx="-4" cy="-84" r="1.2" fill="#1B2A4A"/>
    <!-- Forked tongue -->
    <path d="M-16,-88 L-26,-98 M-16,-88 L-22,-78" stroke="#2E8B57" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Tail end -->
    <circle cx="-5" cy="28" r="3" fill="#2E8B57"/>
    <!-- Corner accents - scale dots -->
    <circle cx="55" cy="-45" r="3" fill="#2E8B57" opacity="0.3"/>
    <circle cx="55" cy="30" r="3" fill="#2E8B57" opacity="0.3"/>
    <circle cx="0" cy="65" r="3" fill="#2E8B57" opacity="0.3"/>
    <circle cx="-58" cy="32" r="3" fill="#2E8B57" opacity="0.3"/>
    <circle cx="-58" cy="-28" r="3" fill="#2E8B57" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="340" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="500" letter-spacing="12" fill="#1B2A4A">BASILISK</text>
</svg>