<svg width="100%" viewBox="0 0 680 350">
  <g transform="translate(340, 150)">
    <!-- Outer eye shape -->
    <path d="M-90,0 C-90,0 -45,-65 0,-65 C45,-65 90,0 90,0 C90,0 45,65 0,65 C-45,65 -90,0 -90,0Z" fill="none" stroke="#1B2A4A" stroke-width="5"/>
    <!-- Inner iris -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#2E8B57" stroke-width="4"/>
    <!-- Pupil - vertical slit (reptilian) -->
    <path d="M0,-28 C8,-10 8,10 0,28 C-8,10 -8,-10 0,-28Z" fill="#1B2A4A"/>
    <!-- Iris detail lines -->
    <line x1="-30" y1="0" x2="-12" y2="0" stroke="#2E8B57" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="0" x2="30" y2="0" stroke="#2E8B57" stroke-width="1.5" opacity="0.5"/>
    <line x1="-25" y1="-15" x2="-10" y2="-8" stroke="#2E8B57" stroke-width="1" opacity="0.35"/>
    <line x1="10" y1="-8" x2="25" y2="-15" stroke="#2E8B57" stroke-width="1" opacity="0.35"/>
    <line x1="-25" y1="15" x2="-10" y2="8" stroke="#2E8B57" stroke-width="1" opacity="0.35"/>
    <line x1="10" y1="8" x2="25" y2="15" stroke="#2E8B57" stroke-width="1" opacity="0.35"/>
    <!-- Highlight -->
    <circle cx="10" cy="-12" r="5" fill="#FFFFFF" opacity="0.6"/>
    <!-- Scale texture around eye -->
    <path d="M-100,-10 C-105,-30 -95,-50 -80,-55" stroke="#1B2A4A" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M100,-10 C105,-30 95,-50 80,-55" stroke="#1B2A4A" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M-100,10 C-105,30 -95,50 -80,55" stroke="#1B2A4A" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M100,10 C105,30 95,50 80,55" stroke="#1B2A4A" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="340" y="305" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="500" letter-spacing="12" fill="#1B2A4A">BASILISK</text>
</svg>